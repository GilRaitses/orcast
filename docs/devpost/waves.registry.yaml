  - id: ORCA-OEYE-R
    family: ORCA
    type: research
    status: dispatched
    depends_on: [ORCA-OM-R, ORCA-OR-R, ORCA-OMAT-R]
    note: "ORCA-EYES research: eye mesh/material (cornea catch-light) + bounded gaze layering on OR head bone / OG orientation; LOD anti-uncanny. Owns web/lib/scene/orca/eyes/. Charter: ORCA-EYES_CHARTER.md."

  - id: ORCA-OMOU-R
    family: ORCA
    type: research
    status: dispatched
    depends_on: [ORCA-OM-R, ORCA-OR-R, ORCA-OG-R]
    note: "ORCA-MOUTH research: teeth(~40-56)/tongue/cavity interior + jaw articulation on OR jaw DOF + labeled OG foraging/buzz-cued subtle open. Owns web/lib/scene/orca/mouth/. Charter: ORCA-MOUTH_CHARTER.md."

  - id: ORCA-OPHYS-R
    family: ORCA
    type: research
    status: dispatched
    depends_on: [ORCA-OR-R, ORCA-OG-R]
    note: "ORCA-PHYSICS research: bounded secondary dynamics (spring/damped flex, follow-through, drag/banking, spine IK) layered on the OG telemetry pose; HARD LINE: never fabricates trajectory, tracks data within tolerance. Owns web/lib/scene/orca/physics/. Charter: ORCA-PHYSICS_CHARTER.md."

  - id: ORCA-BUILD
    family: ORCA
    type: implement
    status: gated
    depends_on: [ORCA-OM-R, ORCA-OR-R, ORCA-OG-R, ORCA-OMAT-R, ORCA-OEYE-R, ORCA-OMOU-R, ORCA-OPHYS-R]
    operator_gate: O0/operator-gated; mesh download+conversion (OM-BUILD), rig (OR-BUILD), motion driver (OG-BUILD), materials/eyes/mouth/physics builds; new deps O0-decided
    note: "Build lanes after research: orca.glb (meshopt/KTX2)+LICENSE, armature+skinning+OrcaRig API, loadBiologging+driveOrca, skin material (WFX-lit), eyes, mouth, secondary-dynamics physics. Net-new under web/lib/scene/orca/ + web/public/orca/. Honesty: modeled animal, simulated/partnership-gated motion; physics never fabricates trajectory."

  - id: ORCA-OINT
    family: ORCA
    type: implement
    status: gated
    depends_on: [ORCA-BUILD]
    operator_gate: O0-gated; single editor; serialize SalishScene.tsx vs W-CAM/W-LABELS/W3/W4/WFX/LGC
    scope_globs:
      - web/app/components/scene/SalishScene.tsx
    note: "Mount the fully dressed + driven orca into the twin underwater view (3D-TWIN W4); commit is operator gate."

