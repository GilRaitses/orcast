statement:
  - >-
    Production backend serves from AWS App Runner (orcast-aws-backend). Both Vercel
    upstreams (ORCAST_API_BASE for /api/be JSON, ORCAST_STREAM_BASE for the
    dedicated /api/narrate-stream SSE route) resolve to App Runner. Topology moves
    from selfhost_cotenant (v2) to vercel_apprunner (v3).
  - >-
    WS-STREAM streamed narration is live through the dedicated Node stream route.
    Explore-session writes now reach RDS (200), resolving the DD-6 console impact.
    The Cloudflare self-host co-tenant is dormant rollback only.

