statement:
  - >-
    The GP wave set ran adversarial gap detection and preflights over the
    self-host cutover surfaces (Phase A, pre-commit) and the live deployment
    (Phase B). Both phases reached a clean exit after remediations.
  - >-
    Phase A: no secrets in any surface; static preflight clean; docs match live
    reality; only the pre-existing SDR O-2 reds in s-doc-grep; q1c-ddb-schema
    PASS; .ddb ledger verified. Fixes: .gitignore now ignores
    infra/shared_host/env/*.env; two stale hostname lines in provision_orcast.sh
    corrected; stray __pycache__ removed.
  - >-
    Phase B: edge reachability + TLS valid; proxy authz matrix correct with
    traffic provably landing on the host and protected paths short-circuited at
    the proxy; co-tenant non-interference (pax cv/shade up, all units enabled,
    ample headroom); rollback intact and the service self-heals on restart; RDS
    explore fails soft (DD-6). Fix: SSH security group tightened to a single
    current /32 (stale prior-IP allow revoked; no 0.0.0.0/0).
  - >-
    A self-caught methodology gap is recorded: initial scans falsely read clean
    because zsh does not word-split unquoted variables and ripgrep skips
    dot-directories; all scans were re-run under bash with grep -r.

rationale: >-
  Harden the cutover artifacts before commit and prove the live deployment is
  correct, isolated, secure, and recoverable, with every finding remediated or
  flagged to an owner.

verification:
  phase_a: "secret-free; preflight green; commit scope locked (awaiting operator approval)"
  phase_b: "live GREEN; co-tenant intact; rollback proven; SSH hardened"
