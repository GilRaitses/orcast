# MLOps wavesets (MLM + MLO), machine-readable shape
# Home: .cca/catalogue/O0/20260627_mlops/
# Canonical prose: MLM_CHARTER.md, MLO_CHARTER.md
# Methodology: docs/methodology/FORECAST_KERNELS.md, CALIBRATION_STUDIES.md

version: 1
home: .cca/catalogue/O0/20260627_mlops/

model: "log lambda = b0 + s_space + k_tide + k_diel + k_lunar + k_season + k_salmon + log E"
fitted_today: [k_diel, k_lunar]
effective_confidence_today: 0.0

honesty:
  - effort_bias: temporal kernels from continuous acoustic detections + log E offset; visual sightings are validation + s_space only
  - no_promotion_without_gate: effective_confidence only rises on a passing gate + recorded human decision
  - acoustic_not_visual: acoustic presence is not visual encounter
  - coverage_honesty: insufficient coverage reports withheld, never a fabricated kernel

literature:
  - "Olson et al. 2018, Salish Sea SRKW sightings (validation + s_space)"
  - "Thornton et al. 2022 CSAS, SRKW summer distribution and habitat use (s_space)"
  - "FORECAST_KERNELS.md section 5: SRKW presence tracks Chinook (k_salmon strongest non-tidal driver)"

families:
  MLM:
    label: covariate-modeling
    status: chartered
    runs: first
    waves:
      - id: M-L0
        level: 0
        script: modeling/studies/level0_detector.py
        study: detector ROC/d' vs confirmed labels + per-station effort
        gate: per-station effort known; detector ROC AUC with CI
        data_ready: true
      - id: M-L1
        level: 1
        script: modeling/studies/level1_psth.py
        study: PSTH for k_diel then k_tide with phase-shuffle null
        gate: PSTH beats shuffled null; shape consistent across stations
      - id: M-L2
        level: 2
        script: modeling/studies/level2_joint.py
        study: joint LNP (tide+diel+lunar+season); lift coverage exclusion when clear
        gate: held-out Poisson LL beats climatology + best single-covariate; CV-stable
      - id: M-L3
        level: 3
        script: modeling/studies/level3_prey_space.py
        study: k_salmon (run-timing + lag scan) + s_space (bathymetry + CAND effort-corrected density)
        gate: held-out skill beats detection-density baseline; calibration (reliability + PIT)

  MLO:
    label: production-mlops-platform
    status: chartered
    runs: after MLM
    waves:
      - { id: MLO-FEAT, scope: versioned covariate/feature store + Great Expectations checks }
      - { id: MLO-REG, scope: model registry + reproducibility (fit_plan/snapshot/repr/run) }
      - { id: MLO-SCHED, scope: scheduled gated retrain EventBridge -> Step Functions -> supervisor, operator-gated }
      - { id: MLO-MON, scope: drift/monitoring (coverage, detector ROC, calibration, freshness) }
      - { id: MLO-CI, scope: mlops-gate in tools/waves/run-gate.sh running study gates + I-suite }

reuse:
  cached_orcahello_index: .cca/catalogue/O0/20260627_forecast-candidates/orcahello_index.cache.json
  cand_candidates: .cca/catalogue/O0/20260627_forecast-candidates/candidates.targets.json
  fit: modeling/fit_kernels.py
  serving: src/aws_backend/kernel_model/serve.py
  promotion: src/aws_backend/promotion/supervisor.py

# Parallel-subagent execution plan that clears the L2/L3 frontier. The families
# block above is the methodology gate ladder (M-L0..M-L3, the gate DEFINITION);
# frontier_dispatch below is the EXECUTION plan (W1/W2/W3 are execution waves,
# not new levels). Canonical prose: WAVESET_CHARTER.md. Decision record:
# DECISION_RECORD.md (operator-confirmed 2026-06-27). Wave 1 prompts: WAVE1_DISPATCH.md.
frontier_dispatch:
  status: W1-W2-W3-done-W4-chartered  # 2026-06-27: W1+W2 ran; W3 L3 real Albion wired (withheld); W4 build wave chartered from the research findings (READY)
  model: inherit                   # operator default
  frontier_state:
    effective_confidence: 0.0      # unchanged; no promotion
    L0: PASS                       # ROC AUC 0.879
    L1: PASS                       # diel; cross-station consistency NOT met (sparse-count artifact, W1/W2)
    L2: FAIL                       # multi-station skill +0.078 stands, but time-rescaling WITHHELD (burstiness, not effort/grid/kernels) and cross-station not consistent; both data-bound (need 3-node production ingest)
    L3: WITHHELD                   # real stock-aligned Albion (Fraser) feed now wired all years 2020-2026 (source=albion); lag scan p=0.394 does not beat the null -> honest withhold, not a wiring gap
  execution_model:
    one_file_one_owner: true
    single_convergence_file_editor_per_wave: true
    convergence_files:
      modeling: [modeling/fit_kernels.py, modeling/studies/level2_multistation.py]
      backend: [src/aws_backend/sources/salmon.py, src/aws_backend/ingest_timeseries.py]
    no_concurrent_heavy_fit_during_parallel_wave: true
    no_production_store_write_during_parallel_wave: true
    refit_upload_disabled: "fk._maybe_write_s3 = lambda: None; write_outputs=False"   # charter B.5
    validate_with: stdlib-ladder-or-one-local-memory-store-fit                         # never a production write
    envs: { heavy_fit: .venv-modeling, ladder_and_gate: system-python3, backend: .venv }   # charter B.7
    local_only_artifacts_untracked: [data/models/**, fit_report.json, model-pickles, figures]  # charter B.6
    no_agent_commits: true                                                            # charter B.10
    honesty_no_promotion_as_side_effect: true                                         # charter B.1-B.5
  aws_store:
    bucket: 198456344617-us-west-2-orcast-aws-backend-raw-payloads                    # charter B.4 (NOT the config default)
    region: us-west-2

  waves:
    - id: W1
      name: de-risk-and-characterize
      parallelism: 5
      convergence_file_edits: false
      launch_status: done                       # ran 2026-06-27; all 5 agents returned honest findings
      agents:
        - { role: effort-logE,        owns: modeling/effort.py,                                  env: .venv-modeling, deliverable: "per-station effort/uptime -> log E offset + exposure for the conditional intensity (ROOT CAUSE for time-rescaling) + WIRING-effort.md" }
        - { role: time-rescaling-diag, owns: modeling/studies/time_rescaling_diag.py,            env: .venv-modeling, deliverable: "characterize why pooled KS p=0.0 (per-station vs pooled, effort sensitivity, grid/bin); recommended-fix block" }
        - { role: cross-station,       owns: modeling/studies/cross_station_consistency.py,       env: .venv-modeling, deliverable: "per-kernel cross-station PSTH correlations + diagnostics; recommendation to clear the 0.5 bar (or honest cannot)" }
        - { role: multistation-ingest, owns: src/aws_backend/ingest_multistation.py,             env: .venv,          deliverable: "ingest orcasound_lab/andrews_bay/north_san_juan_channel into acoustic_detections via reviewed-outcome + cache; DRY-RUN only + WIRING-ingest.md" }
        - { role: salmon-validation,   owns: src/aws_backend/sources/salmon_validation.py,        env: .venv,          deliverable: "validate real Albion/DART feeds, capture payloads, patch spec for salmon.py; does a real feed beat climatology?" }
      gate: "B+C pinpoint the time-rescaling fix AND A's effort module is ready to wire AND D dry-run + E validation report honest findings"

    - id: W2
      name: integrate
      depends_on: [W1]
      status: done                              # ran 2026-06-27 (operator narrowed scope); effort wired, time-rescaling WITHHELD (burstiness), cross-station not consistent, DART parser landed; no promotion
      single_convergence_file_editor_per_file: true
      agents:
        - { role: modeling-integrator, owns: [modeling/fit_kernels.py, modeling/studies/level2_multistation.py], deliverable: "wire effort/logE + time-rescaling fix + cross-station change; refit S3 (upload disabled, write_outputs=False); update level2_multistation.json verdict" }
        - { role: backend-integrator,  owns: [src/aws_backend/sources/salmon.py, src/aws_backend/ingest_timeseries.py], deliverable: "land validated Albion/DART parsers + wire multi-station ingest; the 3-node production store write is operator/deploy-gated" }
      gate: "multi-station refit runs with effort-corrected timing; time-rescaling + cross-station recorded honestly (pass or withheld); no confidence promotion"

    - id: W3
      name: gate-L3-promotion-prep
      depends_on: [W2]
      status: in-progress                       # 2026-06-27: l3-chinook-lag done (real Albion all years, WITHHELD p=0.394); gate-rerun + promotion-packet pending (no gate passes, so no promotion packet)
      agents:
        - { role: l3-chinook-lag,     owns: modeling/studies/salmon_lag.py, status: done, deliverable: "re-run lag scan on the validated real Chinook feed; verdict pass or withheld -> real stock-aligned Albion (Fraser) wired all years 2020-2026 via aimez EC2 FOS fetch; WITHHELD (lag +20d, r=0.076, p=0.394, does not beat null)" }
        - { role: gate-rerun,         owns: tools/waves/run-gate.sh, deliverable: "mlops-gate + honesty guard re-run; served confidence must not exceed earned" }
        - { role: promotion-packet,   owns: docs/promotion-packet, deliverable: "supervisor promotion packet, prepared ONLY if a gate passes; promotion is a recorded supervisor decision (operator-gated)" }
      gate: "a real gate passes AND the supervisor records the decision -> effective_confidence raised; otherwise stays 0% honestly"

    - id: W4
      name: graduate-research-findings
      depends_on: [W3, research_dispatch]
      status: dispatch-ready                     # READY; launch is the next operator gate. Charter: W4_BUILD_CHARTER.md; prompts: W4_BUILD_DISPATCH.md
      single_convergence_file_editor_per_file: true
      agents:
        - { role: modeling-integrator, owns: [modeling/fit_kernels.py, modeling/studies/cross_station_consistency.py], deliverable: "ITEM1 (ungated) re-score cross-station consistency at 8-12 bins + min per-bin count + partial pooling + burst-dedup (diel 0.08->0.42, lunar clears 0.5); ITEM3 (gated, WRITE-ONLY) Hawkes diagnostic + bin-level timing gate (NB PIT + CV-skill) behind a default-OFF flag, do NOT adopt/promote" }
        - { role: study-integrator,     owns: modeling/studies/salmon_lag.py, deliverable: "ITEM2 (ungated) pre-registered SRKW-summer (Jun-Sep, +lag) L3 conditioning + held-out year on the real Albion feed; L3 stays WITHHELD unless the held-out year also beats the null; optional summer-only counts re-test (RA)" }
      gate: "items 1+2 landed; mlops-gate green; served confidence still 0.0; bin-level timing gate present but OFF"
      confidence_gate: "item 3 adoption (bin-level timing gate) is a recorded supervisor decision via promotion/supervisor.py; effective_confidence rises ONLY on that decision (B.1)"

  out_of_scope:
    - "MLO platform (FEAT/REG/SCHED/MON/CI): chartered in MLO_CHARTER.md, operator/deploy-gated, a later track"
    - "confidence promotion without a passing gate + recorded supervisor decision"
    - "claiming acoustic presence equals visual encounter"

  operator_gates:
    - Wave 1 launch
    - wave-to-wave promotion after the stated gate
    - the production acoustic_detections store write for the 3 nodes (deploy-gated)
    - any commit or push (explicit operator request only)
    - any confidence promotion (passing gate + recorded supervisor decision)

# Investigation-first research waveset to find ways to push L2 and L3 off their honest
# blockers. Canonical prose: RESEARCH_CHARTER.md. Agent prompts: RESEARCH_DISPATCH.md.
# Findings are decision aids; nothing promotes confidence. The operator decides which
# findings graduate to a future build/integrate wave (W4).
research_dispatch:
  status: done                       # ran 2026-06-27; RA-RF returned; findings under research/
  model: inherit
  blocker_map:                       # CORRECTED by the research wave (RE refutes the ingest dep)
    l2_time_rescaling: "WITHHELD = detection burstiness (branching ratio 0.79-0.96 = detector repeat-triggering); no event-level Exp(1) fix passes (RD); honest path = bin-level GOF gate (NB PIT + CV-skill), operator-gated build wave"
    l2_cross_station:  "NOT simply gated on the 3-node ingest (RE refutes: it moves the same cached records, adds 0 observations). Binding = scoring resolution (24-bin too fine) + burstiness; ungated fix = re-score at 8-12 bins + partial pooling + burst-dedup (diel 0.08->0.42, lunar clears 0.5 now); 24-bin target effectively unreachable for years"
    l3_salmon:         "WITHHELD = off-season pooling, NOT the response variable (RA: counts do not help). Conditioning sharpens it (RB: SRKW-summer Jun-Sep r=0.251 p=0.013, exploratory). Temperature/diel dead-end (RC)"
  findings:            # research/*.md (+ report JSONs)
    - { agent: RA, doc: research/L3_response_variable.md, verdict: "counts/rate/GLM do not beat the null; response variable not the limiter (dead-end)" }
    - { agent: RB, doc: research/L3_conditioning.md, verdict: "SRKW-summer conditioning beats the null exploratorily; real L3 lever (graduate, pre-registered)" }
    - { agent: RC, doc: research/L3_diel_temperature.md, verdict: "time-of-day irrelevant; temperature NO-GO as animal kernel (collinear k_season) (dead-end)" }
    - { agent: RD, doc: research/L2_burstiness_timing.md, verdict: "no event-level fix; bin-level timing gate is the honest path (graduate, operator-gated)" }
    - { agent: RE, doc: research/L2_data_volume.md, verdict: "ingest is not the binding cross-station dep; coarser-bin + partial-pooling re-score is the ungated fix (graduate)" }
    - { agent: RF, doc: research/SYNTHESIS_L2_L3.md, verdict: "ranked plan; ungated U1 consistency re-score + U4 summer-L3 conditioning; graduate RD/RE/RB to W4" }
  graduate_to_w4:
    - "RE/RB consistency re-score at 8-12 bins + min per-bin count + partial pooling + burst-dedup (UNGATED methodology change)"
    - "RD bin-level timing-gate redefinition (NB PIT calibrated AND CV skill > climatology) + Hawkes diagnostic (operator-gated)"
    - "RB pre-registered SRKW-summer L3 conditioning + counts + held-out year (L3 stays withheld until it holds out)"
  dead_ends: ["RA counts response variable", "RC temperature animal kernel + diel-for-L3"]
  execution_model:
    investigation_first: true
    one_findings_doc_per_agent: true
    findings_dir: .cca/catalogue/O0/20260627_mlops/research/
    no_convergence_file_edits: true   # salmon_lag.py / time_rescaling_diag.py / cross_station_consistency.py reused read-only
    refit_upload_disabled: "fk._maybe_write_s3 = lambda: None; write_outputs=False"
    no_promotion: true
    no_agent_commits: true
    external_feeds_via: aimez-ec2     # i-04a649f91274e9fce; see WIRING-salmon-albion.md
  agents:
    - { role: l3-response-variable, owns: research/L3_response_variable.md, question: "Q1 daily COUNTS / rate / count GLM vs binary presence; beats the null where binary did not?" }
    - { role: l3-conditioning,      owns: research/L3_conditioning.md,      question: "Q2 restrict to run/summer season, per-station, SRKW window; does conditioning sharpen alignment?" }
    - { role: diel-temperature,     owns: research/L3_diel_temperature.md,  question: "Q3 diel-window conditioning + Q5 temperature/SST sources and its honest role (effect modifier vs effort term, B.2)" }
    - { role: l2-burstiness,        owns: research/L2_burstiness_timing.md, question: "Q4 self-excitation/Hawkes/refractory/hurdle or bin-level GOF -> does the timing gate pass honestly? (ungated L2 ammo)" }
    - { role: l2-data-volume,       owns: research/L2_data_volume.md,       question: "Q6 power analysis: detections/station for split-half >=0.5; what the 3-node ingest adds; confirm it is the binding cross-station dep" }
    - { role: synthesis,            owns: research/SYNTHESIS_L2_L3.md,      question: "Q7 ranked action plan: ungated vs gated, payoff, cheapest next experiment; what graduates to a W4 build wave", depends_on: [l3-response-variable, l3-conditioning, diel-temperature, l2-burstiness, l2-data-volume] }
  gate: "each findings doc lands with measured numbers + a recommendation; synthesis produces the ranked plan; no promotion"
  operator_gates:
    - research wave launch
    - graduating a finding to a build/integrate wave (W4)
    - any commit or push
    - any confidence promotion (unchanged)
