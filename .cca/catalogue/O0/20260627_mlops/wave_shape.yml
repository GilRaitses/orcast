        - { role: supervisor-promotion, owns: src/aws_backend/promotion/supervisor.py, deliverable: "route promotion ONLY in the PROMOTE band per G2; the recorded human decision finalizes it (B.1)" }
      gate: "PROMOTE band met (skill>=+0.144 etc.) AND a recorded supervisor decision -> effective_confidence rises to the P0-graduated value; HOLD band -> WAIT or caveated sub-0.6 by explicit decision; otherwise 0%"
