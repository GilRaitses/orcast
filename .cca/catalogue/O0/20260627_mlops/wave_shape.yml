        pit_calibrated: true                       # ks_pval 0.364
        level1_beats_null: [diel, lunar, season]
        time_rescaling: withheld                   # event-level Exp(1) fails (detector chatter)
        mapped_confidence: 0.49                     # P0 map; HOLD band (< 0.6 supervisor threshold)
        supervisor_recommendation: hold            # "Confidence 0.49 (< 0.6 threshold). Recommend HOLD."
        promoted: false                            # NOT promoted; write_outputs=False so served fit_report.json untouched, served confidence 0.0
        refit_safety: "fk._maybe_write_s3=lambda:None; write_outputs=False (B.5)"
      objective: O3
      decision_bands:                            # G2: do not conflate
        hold:    "served skill>0, >=4/5 folds -> conf in (0,0.6); +0.078 -> 0.49. supervisor HOLDs. Default for the ingest-alone case = WAIT for ~+0.144, OR operator records an explicit B.1 decision to serve a sub-0.6 caveated confidence."
        promote: "served skill >=+0.144 AND >=4/5 folds AND across-fold lower bound (mean-t*SE) >=+0.078 AND PIT calibrated AND a beaten L1 null -> conf >=0.6 -> supervisor may PROMOTE on a recorded decision."
