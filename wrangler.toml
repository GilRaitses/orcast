name = "orcast-app"
main = "src/index.js"
compatibility_date = "2024-01-01"

[env.production]
name = "orcast-app"
route = "orcast.org/*"

[env.production.vars]
ENVIRONMENT = "production"
API_BASE_URL = "http://127.0.0.1:8080"

[[env.production.kv_namespaces]]
binding = "CACHE"
id = "5be3501a637543079f3efc0f04b10fdc"

[env.staging]
name = "orcast-app-staging"
route = "staging.orcast.org/*"

[env.staging.vars]
ENVIRONMENT = "staging"
API_BASE_URL = "http://127.0.0.1:8080"

[[env.staging.kv_namespaces]]
binding = "CACHE"
preview_id = "cbdaaa98a8f34985a7fc04ebd94b75c5"

[build]
command = "cd orcast-angular && npm ci && npm run build -- --configuration=cloudflare"
cwd = "."
watch_dir = "orcast-angular/src" 