name: Angular Unit Tests

on:
  pull_request:
    paths:
      - 'orcast-angular/**'
      - '.github/workflows/angular-test.yml'
  push:
    branches:
      - main
    paths:
      - 'orcast-angular/**'
      - '.github/workflows/angular-test.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: orcast-angular/package-lock.json
      - name: Install dependencies
        run: cd orcast-angular && npm ci
      - name: Run unit tests
        run: cd orcast-angular && npm run test:ci
