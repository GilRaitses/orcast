name: AWS Backend CI

on:
  pull_request:
    paths:
      - 'src/aws_backend/**'
      - 'tests/aws_backend/**'
      - 'infra/aws/**'
      - 'tools/deployment/aws/**'
      - 'requirements.txt'
      - '.github/workflows/aws-backend-ci.yml'
  push:
    branches:
      - main
    paths:
      - 'src/aws_backend/**'
      - 'tests/aws_backend/**'
      - 'infra/aws/**'
      - 'tools/deployment/aws/**'
      - 'requirements.txt'
      - '.github/workflows/aws-backend-ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r tools/deployment/aws/requirements.txt pytest httpx cfn-lint
      - name: Compile AWS backend
        run: python -m compileall -q src/aws_backend tests/aws_backend
      - name: Run AWS backend tests
        run: python -m pytest tests/aws_backend -q
      - name: Lint CloudFormation template
        run: cfn-lint infra/aws/template.yaml

