# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
    paths:
      - 'orcast-angular/**'
      - 'firebase.json'
      - 'scripts/inject-backend-url.sh'
      - 'infra/aws/state/deployment-manifest.json'
      - '.github/workflows/firebase-hosting-merge.yml'
  workflow_dispatch:

jobs:
  build_and_deploy:
    if: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ORCA_904DE != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: orcast-angular/package-lock.json

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ORCA_904DE }}

      - name: Install dependencies
        run: cd orcast-angular && npm ci

      - name: Inject backend URL
        run: |
          BACKEND_URL="${{ vars.ORCAST_BACKEND_URL }}"
          if [ -n "$BACKEND_URL" ]; then
            bash scripts/inject-backend-url.sh "$BACKEND_URL"
          elif [ -f infra/aws/state/deployment-manifest.json ]; then
            bash scripts/inject-backend-url.sh
          fi

      - name: Build Angular app
        run: cd orcast-angular && npm run build -- --configuration=firebase

      - name: Deploy to Firebase Hosting
        id: deploy
        continue-on-error: true
        run: |
          npm install -g firebase-tools
          firebase deploy --only hosting --project orca-904de --non-interactive

      - name: Report Firebase deploy status
        if: steps.deploy.outcome != 'success'
        run: |
          echo "::warning::Firebase deploy failed. Update FIREBASE_SERVICE_ACCOUNT_ORCA_904DE per docs/CI_DEPLOY_SETUP.md"
          echo "Or run locally: firebase login && bash tools/deployment/firebase/deploy.sh"

  skip-not-configured:
    if: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ORCA_904DE == '' }}
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "::notice::Firebase deploy skipped — FIREBASE_SERVICE_ACCOUNT_ORCA_904DE secret is not set."
          echo "See docs/CI_DEPLOY_SETUP.md"
