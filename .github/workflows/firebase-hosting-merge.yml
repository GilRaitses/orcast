name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: orcast-angular/package-lock.json
      - name: Install dependencies
        run: cd orcast-angular && npm ci
      - name: Inject backend URL
        run: |
          BACKEND_URL="${{ vars.ORCAST_BACKEND_URL }}"
          if [ -z "$BACKEND_URL" ] && [ -f infra/aws/state/deployment-manifest.json ]; then
            bash scripts/inject-backend-url.sh
          elif [ -n "$BACKEND_URL" ]; then
            bash scripts/inject-backend-url.sh "$BACKEND_URL"
          fi
      - name: Build Angular app
        run: cd orcast-angular && npm run build -- --configuration=firebase
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_ORCA_904DE }}'
          projectId: orca-904de
