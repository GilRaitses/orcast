  - id: antarctic_typeB_satellite_dive
    rank: gated
    status: by_request_not_open
    species: Orcinus orca
    ecotype: [Type B (seal/penguin-hunting), Type C]
    region: Antarctic Peninsula / Ross Sea
    hosts: [Royal Society Biology Letters, Polar Biology, institutional]
    refs:
      - Durban & Pitman 2012, Biol. Lett., 10.1098/rsbl.2011.0875
      - Andrews, Pitman & Ballance 2008, Polar Biol., 10.1007/s00300-008-0487-z
    license: not openly deposited (data by request from authors/SWFSC)
    downloadable_without_agreement: no
    tag: SPOT5 / Mk10-A satellite (Wildlife Computers), Argos
